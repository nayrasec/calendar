<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Universe ✨</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Starfield Background -->
  <div class="starfield"></div>
  
  <!-- Header -->
  <header class="hero">
    <h1>✨ Our Universe ✨</h1>
    <p class="subtitle">Where every star holds a memory</p>
  </header>

  <!-- Universe Container -->
  <div class="universe-container">
    <!-- Constellations will be rendered here -->
    <div id="constellationsContainer"></div>
  </div>

  <!-- Add Memory Modal -->
  <div class="memory-modal" id="memoryModal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeMemoryModal()">×</span>
      <h2>Add Memory to Star</h2>
      <form onsubmit="saveMemory(event)">
        <div class="form-group">
          <label for="memoryTitle">Memory Title</label>
          <input type="text" id="memoryTitle" placeholder="Name this special moment..." required>
        </div>
        <div class="form-group">
          <label for="memoryDate">Date (Optional)</label>
          <input type="date" id="memoryDate">
        </div>
        <div class="form-group">
          <label for="memoryDescription">Description</label>
          <textarea id="memoryDescription" rows="4" placeholder="Tell the story..." required></textarea>
        </div>
        <div class="form-buttons">
          <button type="submit" class="btn-primary">💾 Save Memory</button>
          <button type="button" class="btn-secondary" onclick="closeMemoryModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Constellation Modal -->
  <div class="constellation-modal" id="constellationModal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeConstellationModal()">×</span>
      <h2>Create New Constellation</h2>
      <form onsubmit="createConstellation(event)">
        <div class="form-group">
          <label for="constellationName">Constellation Name</label>
          <input type="text" id="constellationName" placeholder="e.g., AARYAN, PRIYA, FOREVER..." required maxlength="20">
        </div>
        <div class="form-buttons">
          <button type="submit" class="btn-primary">✨ Create Constellation</button>
          <button type="button" class="btn-secondary" onclick="closeConstellationModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Constellation Button (Bottom Right) -->
  <button class="floating-btn" onclick="openConstellationModal()" title="Create new constellation">
    + New Constellation
  </button>

  <footer>
    <p>Infinite memories in an infinite universe 💫</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
